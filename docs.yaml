openapi: 3.0.0
info:
  title: Acessment AI
  version: 1.1.0
  description: API para maior orientação no consumo do Acessment AI - que é um projeto que automatiza correção de prova no sistema americano.

servers:
  - url: https://acessment-ai.onrender.com/api
    description: Servidor local de desenvolvimento

paths:
  /register:
    post:
      summary: Registar novo utilizador
      description: Endpoint para criar uma nova conta de utilizador.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  example: omarscode
                email:
                  type: string
                  format: email
                  example: omarscode@gmail.com
                password:
                  type: string
                  format: password
                  example: Senha123
      responses:
        "201":
          description: Utilizador registado com sucesso!
        "400":
          description: Pedido inválido

  /login:
    post:
      summary: Autenticar utilizador
      description: Autentica um utilizador usando email e senha e retorna tokens JWT.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: usuario@exemplo.com
                password:
                  type: string
                  format: password
                  example: senha_segura123
              required:
                - email
                - password
      responses:
        "200":
          description: Autenticado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  refresh:
                    type: string
                    example: eyJ0eXAiOiJKV1QiLCJhbGciOi...
                  access:
                    type: string
                    example: eyJ0eXAiOiJKV1QiLCJhbGciOi...
                  email:
                    type: string
                    example: usuario@exemplo.com
        "400":
          description: Email ou senha não fornecidos
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Email and password required
        "401":
          description: Credenciais inválidas
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Invalid credentials

  /get-me:
    get:
      summary: Obter dados do utilizador autenticado
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dados obtidos com sucesso!
          content:
            application/json:
              schema:
                type: object
                properties:
                  username:
                    type: string
                    example: omarscode
                  email:
                    type: string
                    format: email
                    example: omarscode@gmail.com

  /extract-pdf-text:
    post:
      summary: Upload de gabarito (chave de correção)
      description: Envia um PDF do gabarito e extrai automaticamente as respostas corretas e cotações usando IA.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                title:
                  type: string
                  description: Título da prova
                  example: Prova de Matemática
                pdf:
                  type: string
                  format: binary
                  description: Ficheiro PDF do gabarito
                fase:
                  type: string
                  enum: [F1, F2]
                  description: Fase da prova
                  example: F1
                category:
                  type: string
                  enum: [primario, secundario, medio]
                  description: Categoria do ensino
                  example: medio
                variant:
                  type: string
                  enum: [A, B]
                  description: Variante da prova
                  example: A
                classe:
                  type: integer
                  description: Classe/ano (opcional)
                  example: 10
              required:
                - title
                - pdf
                - fase
                - category
                - variant
      responses:
        "200":
          description: Gabarito processado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  key_id:
                    type: integer
                    description: ID da chave criada
                    example: 1
                  resumo:
                    type: object
                    properties:
                      total_questoes:
                        type: integer
                        example: 10
                      respostas:
                        type: object
                        additionalProperties:
                          type: object
                          properties:
                            resposta:
                              type: string
                              example: A
                            cotacao:
                              type: number
                              example: 2
                        example:
                          "1":
                            resposta: "A"
                            cotacao: 2
                          "2":
                            resposta: "D"
                            cotacao: 2.5
        "400":
          description: Nenhum PDF enviado
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Nenhum PDF enviado.
        "500":
          description: Erro ao processar o arquivo
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Falha ao ler o PDF: arquivo corrompido"

  /upload-test:
    post:
      summary: Upload de respostas dos alunos
      description: Faz upload de múltiplas imagens com respostas dos alunos, processa via OCR+IA e corrige automaticamente usando a chave indicada.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Lista de imagens das folhas de resposta
                fase:
                  type: string
                  enum: [F1, F2]
                  description: Fase da prova
                  example: F1
                key:
                  type: integer
                  description: ID da chave de correção (gabarito) usada
                  example: 1
              required:
                - image
                - fase
                - key
      responses:
        "201":
          description: Imagens enviadas para processamento assíncrono
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Imagens enviadas para processamento
        "400":
          description: Erro no envio
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Campo 'fase' é obrigatório

  /update-student/{student_id}:
    put:
      summary: Atualizar dados do aluno
      security:
        - bearerAuth: []
      parameters:
        - name: student_id
          in: path
          required: true
          schema:
            type: integer
          description: ID do aluno
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Omar Rodrigues
      responses:
        "202":
          description: Aluno atualizado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 1
                  name:
                    type: string
                    example: Omar Rodrigues
        "404":
          description: Aluno não encontrado

  /get-students:
    get:
      summary: Listar todos os alunos com resultados
      description: Retorna todos os alunos com as suas respostas, incluindo contagem de aprovados e reprovados por aluno.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Lista de alunos retornada com sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      example: 1
                    name:
                      type: string
                      example: Omar Rodrigues
                    grade:
                      type: integer
                      example: 10
                    turma:
                      type: string
                      example: IB
                    course:
                      type: string
                      example: Informática
                    category:
                      type: string
                      example: medio
                    total_aprovados:
                      type: integer
                      description: Número de provas aprovadas do aluno
                      example: 2
                    total_reprovados:
                      type: integer
                      description: Número de provas reprovadas do aluno
                      example: 1
                    answers:
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 1
                          student:
                            type: integer
                            example: 1
                          answer_img_url:
                            type: string
                            example: https://res.cloudinary.com/...
                          answer_matrix:
                            type: object
                            description: Respostas do aluno extraídas via OCR
                            example:
                              "1": "A"
                              "2": "B"
                              "3": "D"
                          note:
                            type: number
                            description: Nota final calculada
                            example: 12.5
                          corrects:
                            type: integer
                            description: Número de respostas corretas
                            example: 8
                          wrongs:
                            type: integer
                            description: Número de respostas erradas
                            example: 2
                          nulls:
                            type: integer
                            description: Número de questões sem resposta
                            example: 0
                          fase:
                            type: string
                            example: F1
                          status:
                            type: string
                            description: "Resultado: Aprovado (nota >= 10) ou Reprovado"
                            enum: [Aprovado, Reprovado]
                            example: Aprovado
                          chave:
                            type: integer
                            description: ID da chave de correção utilizada
                            example: 1

  /get-total-students:
    get:
      summary: Retornar total de estudantes
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Total retornado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                    example: 20

  /get-total-reprovados:
    get:
      summary: Retornar total de provas reprovadas
      description: Retorna a contagem total de provas com status Reprovado (nota < 10).
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Total retornado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                    example: 20

  /get-total-aprovados:
    get:
      summary: Retornar total de provas aprovadas
      description: Retorna a contagem total de provas com status Aprovado (nota >= 10).
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Total retornado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                    example: 20

  /exam-results:
    get:
      summary: Listar resultados de provas por gabarito
      description: |
        Retorna todas as provas dos alunos com notas, resultados e nome, filtrável por gabarito.
        Permite consultar o desempenho dos alunos face a uma chave de correção específica.
      security:
        - bearerAuth: []
      parameters:
        - name: key_id
          in: query
          required: false
          schema:
            type: integer
          description: Filtrar por ID do gabarito (chave de correção)
          example: 1
        - name: fase
          in: query
          required: false
          schema:
            type: string
            enum: [F1, F2]
          description: Filtrar por fase da prova
          example: F1
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [aprovado, reprovado, aprovou, reprovou]
          description: Filtrar por resultado (aprovado ou reprovado)
          example: aprovado
      responses:
        "200":
          description: Lista de resultados retornada com sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      description: ID da resposta do aluno
                      example: 1
                    student:
                      type: integer
                      description: ID do aluno
                      example: 1
                    student_name:
                      type: string
                      description: Nome do aluno
                      example: Omar Rodrigues
                    student_grade:
                      type: integer
                      description: Classe/ano do aluno
                      example: 10
                    student_turma:
                      type: string
                      description: Turma do aluno
                      example: IB
                    student_category:
                      type: string
                      description: Categoria do aluno
                      example: medio
                    note:
                      type: number
                      description: Nota final calculada
                      example: 12.5
                    corrects:
                      type: integer
                      description: Número de respostas corretas
                      example: 8
                    wrongs:
                      type: integer
                      description: Número de respostas erradas
                      example: 2
                    nulls:
                      type: integer
                      description: Número de questões sem resposta
                      example: 0
                    fase:
                      type: string
                      description: Fase da prova
                      example: F1
                    status:
                      type: string
                      description: "Resultado: Aprovado (nota >= 10) ou Reprovado"
                      enum: [Aprovado, Reprovado]
                      example: Aprovado
                    answer_matrix:
                      type: object
                      description: Respostas do aluno extraídas via OCR
                      example:
                        "1": "A"
                        "2": "B"
                        "3": "D"
                    gabarito:
                      type: object
                      description: Dados da chave de correção utilizada
                      properties:
                        id:
                          type: integer
                          example: 1
                        title:
                          type: string
                          example: Prova de Matemática
                        fase:
                          type: string
                          example: F1
                        category:
                          type: string
                          example: medio
                        variant:
                          type: string
                          example: A
                        matrix:
                          type: object
                          description: "Matriz do gabarito: cada questão com resposta correta e cotação"
                          example:
                            "1":
                              resposta: "A"
                              cotacao: 2
                            "2":
                              resposta: "D"
                              cotacao: 2.5
                        classe:
                          type: integer
                          nullable: true
                          example: 10

security:
  bearerAuth:
    type: http
    scheme: bearer
    bearerFormat: JWT

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
